<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TokiDo</title>
    <link rel="icon" type="image/svg+xml" href="images/icon.svg" />
    <link rel="stylesheet" href="styles.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <script src="https://cdn.tailwindcss.com"></script>
  </head>

  <body class="min-h-screen bg-gradient-to-br from-blue-50 to-blue-100">
    <nav class="bg-white shadow-sm">
      <div class="max-w-9xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between h-16">
          <div class="flex items-center">
            <span class="text-xl font-bold text-blue-600">TokiDo</span>
          </div>
          <div class="flex space-x-8">
            <button
              class="nav-btn inline-flex items-center px-1 pt-2 border-b-2 border-transparent text-sm font-medium text-gray-500 hover:text-gray-700"
              data-page="tasks"
            >
              <i class="fas fa-tasks mr-2"></i> Tasks
            </button>
            <button
              class="nav-btn inline-flex items-center px-1 pt-2 border-b-2 border-transparent text-sm font-medium text-gray-500 hover:text-gray-700"
              data-page="calendar"
            >
              <i class="fas fa-calendar mr-2"></i> Calendar
            </button>
            <button
              class="nav-btn inline-flex items-center px-1 pt-2 border-b-2 border-transparent text-sm font-medium text-gray-500 hover:text-gray-700"
              data-page="settings"
            >
              <i class="fas fa-cog mr-2"></i> Settings
            </button>
          </div>
        </div>
      </div>
    </nav>

    <div class="max-w-9xl mx-auto p-6">
      <!-- Main Content Area -->
      <div class="grid gap-4 grid-cols-1 lg:grid-cols-4">
        <div class="lg:col-span-1 space-y-4">
          <!--Quick Actions-->
          <div class="p-4 flex flex-col gap-3 bg-white rounded-xl shadow-sm">
            <button
              class="w-full p-2 rounded-lg bg-blue-500 text-white text-base cursor-pointer transition-colors hover:bg-blue-600"
              id="showTaskModal"
            >
              <i class="fas fa-plus"></i> New Task
            </button>
            <button
              class="w-full p-2 rounded-lg border-2 border-blue-500 text-base cursor-pointer transition-colors hover:bg-blue-50"
              id="showEventModal"
            >
              <i class="fas fa-calendar"></i> Add Event
            </button>
          </div>
          <div class="p-4 bg-white rounded-xl shadow-sm">
            <h2 class="font-bold text-lg mb-4">Overview</h2>
            <div class="space-y-3" id="overviewStats"></div>
          </div>
          <!-- Quote Bar -->
          <div class="bg-white rounded-xl shadow-sm p-4">
            <div class="flex gap-4">
              <p
                class="w-full text-lg text-gray-600 italic leading-relaxed p-3 border-l-4 border-blue-400 bg-blue-50 rounded-r-lg inline-block text-left"
              >
                "To know ten thousand things, know one well."
                <span class="block mt-2 text-sm text-gray-500 not-italic"
                  >- Miyamoto Musashi</span
                >
              </p>
            </div>
          </div>
        </div>

        <div class="lg:col-span-3 space-y-4" id="main-content"></div>
      </div>
    </div>

    <script src="js/taskManager.js" defer></script>
    <script src="js/calendarManager.js" defer></script>
    <script type="module" src="js/app.js" defer></script>
  </body>
</html>
