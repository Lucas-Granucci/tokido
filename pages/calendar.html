<div class="bg-white rounded-xl shadow-sm p-4">
  <div class="flex justify-between items-center mb-6">
    <h1 class="text-2xl font-bold text-gray-800">Calendar</h1>
    <div class="flex space-x-4">
      <button
        id="calendarPrev"
        class="px-4 py-2 bg-white border border-gray-300 rounded-lg shadow-sm hover:bg-gray-50"
      >
        <i class="fas fa-chevron-left mr-2"></i> Previous
      </button>
      <span class="px-4 py-2 font-medium" id="current-month">October 2023</span>
      <button
        id="calendarNext"
        class="px-4 py-2 bg-white border border-gray-300 rounded-lg shadow-sm hover:bg-gray-50"
      >
        Next <i class="fas fa-chevron-right ml-2"></i>
      </button>
    </div>
  </div>

  <!-- Calendar content will go here -->
  <div id="calendar"></div>
</div>
