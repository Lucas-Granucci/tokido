<div>
  <div
    id="viewSelector"
    class="flex flex-col bg-white p-4 gap-4 rounded-xl shadow-sm"
  >
    <!-- Button and View Selectors -->
    <div class="flex flex-row gap-4 text-center">
      <button
        class="flex-1 p-3 rounded-lg border-2 border-blue-500 bg-blue-100 text-center transition-all duration-200"
        data-view="dueDate-view"
      >
        <i class="fas fa-calendar-check mr-2"></i> Due Date
      </button>
      <button
        class="flex-1 p-3 rounded-lg border-2 border-blue-500 bg-blue-100 text-center transition-all duration-200"
        data-view="duration-view"
      >
        <i class="fas fa-clock mr-2"></i> Duration
      </button>
      <button
        class="flex-1 p-3 rounded-lg border-2 border-blue-500 bg-blue-100 text-center transition-all duration-200"
        data-view="category-view"
      >
        <i class="fas fa-folder mr-2"></i> Category
      </button>
      <button
        class="flex-1 p-3 rounded-lg border-2 border-blue-500 bg-blue-100 text-center transition-all duration-200"
        data-view="priority-view"
      >
        <i class="fas fa-flag mr-2"></i> Priority
      </button>
    </div>

    <!-- Task Section -->
    <div class="space-y-4">
      <div class="view" id="dueDate-view"></div>
      <div class="view" id="duration-view"></div>
      <div class="view" id="category-view"></div>
      <div class="view" id="priority-view"></div>
    </div>
  </div>
</div>
