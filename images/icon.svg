<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <defs>
    <linearGradient id="blueGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#93C5FD"/> <!-- Tailwind blue-300 -->
      <stop offset="50%" stop-color="#60A5FA"/> <!-- Tailwind blue-400 -->
      <stop offset="100%" stop-color="#3B82F6"/> <!-- Tailwind blue-500 -->
    </linearGradient>
  </defs>

  <!-- gradient background -->
  <rect width="48" height="48" rx="10" fill="url(#blueGradient)"/>

  <!-- unique checkmark -->
  <path d="M14 30l6 5 14-15" 
        fill="none" stroke="white" stroke-width="6"
        stroke-linecap="round" stroke-linejoin="round"/>
</svg>

